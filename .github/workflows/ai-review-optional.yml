name: AI Review (Optional)

on:
  pull_request:
    types: [labeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: ai-review
    if: github.event.action == 'labeled' && github.event.label.name == 'ai-review'
    runs-on: ubuntu-latest
    steps:
      - name: Post non-blocking AI review notice
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "AI review is enabled for this PR via the `ai-review` label.",
              "",
              "This workflow is intentionally non-blocking and does not fail the PR.",
              "You can later replace this step with your preferred provider (Copilot, OpenAI, Anthropic, etc.)."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
